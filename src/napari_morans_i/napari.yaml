name: napari-morans-i
display_name: Moran's I
visibility: public

# All contributions exposed by this plugin.
contributions:
  commands:
    - id: napari-morans-i.make_widget
      title: Open Moran's I Widget
      python_name: napari_morans_i._widget:MoransIWidget
    - id: napari-morans-i.make_sample
      title: Create Moran's I sample image
      python_name: napari_morans_i._sample_data:make_sample_data
  widgets:
    - command: napari-morans-i.make_widget
      display_name: Moran's I Analysis
  sample_data:
    - command: napari-morans-i.make_sample
      key: morans_i_sample
      display_name: Moran's I demo image
